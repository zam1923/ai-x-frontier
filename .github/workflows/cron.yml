name: 自律運用 Cron

on:
  schedule:
    # JST 9:00 (UTC 0:00) と JST 21:00 (UTC 12:00) の1日2回
    - cron: "0 0 * * *"
    - cron: "0 12 * * *"
    # 毎日21:00 UTC (= 翌朝6:00 JST) — 深掘り更新
    - cron: "0 21 * * *"
  # 手動実行も可能
  workflow_dispatch:
    inputs:
      sync_type:
        description: "同期タイプ (article | daily)"
        required: false
        default: "article"

jobs:
  article-sync:
    name: 記事同期（1日2回）
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.sync_type == 'article' || github.event.inputs.sync_type == '') ||
      github.event.schedule == '0 0 * * *' ||
      github.event.schedule == '0 12 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: X収集 + 記事生成トリガー
        run: |
          echo "記事同期トリガー（1日2回）: $(date)"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 300 \
            -X POST "${{ secrets.APP_URL }}/api/sync/trigger/hourly" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          echo "Response status: $STATUS"
          # 409 = already running (OK), 200 = triggered OK
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "409" ]; then
            echo "::warning::同期APIが${STATUS}を返しました"
          fi

  daily-sync:
    name: 毎日深掘り更新（プロフィール更新）
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.sync_type == 'daily' ||
      github.event.schedule == '0 21 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: エンティティ深掘り更新トリガー
        run: |
          echo "深掘り同期トリガー: $(date)"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 300 \
            -X POST "${{ secrets.APP_URL }}/api/sync/trigger/deep" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          echo "Response status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "409" ]; then
            echo "::warning::深掘り同期APIが${STATUS}を返しました"
          fi
