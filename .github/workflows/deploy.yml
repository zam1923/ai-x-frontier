name: Vercel デプロイ

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Vercel Production Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel
        run: |
          npx vercel --prod --yes \
            --token ${{ secrets.VERCEL_TOKEN }} \
            --build-env GROK_API_KEY=${{ secrets.GROK_API_KEY }} \
            --build-env APIFY_API_TOKEN=${{ secrets.APIFY_API_TOKEN }} \
            --build-env SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --build-env SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
