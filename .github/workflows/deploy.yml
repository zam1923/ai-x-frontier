name: 型チェック & Render デプロイ

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  typecheck:
    name: TypeScript 型チェック
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

  deploy:
    name: Render デプロイ通知
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook (optional)
        # RENDER_DEPLOY_HOOK シークレットが設定されている場合のみ実行
        # Render ダッシュボード → Settings → Deploy Hook で取得できます
        if: ${{ env.RENDER_DEPLOY_HOOK != '' }}
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          echo "Render デプロイフック実行中..."
          curl -s "$RENDER_DEPLOY_HOOK" > /dev/null
          echo "完了"

      - name: Deploy info
        if: ${{ env.RENDER_DEPLOY_HOOK == '' }}
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          echo "Render は GitHub main ブランチへのプッシュで自動デプロイされます。"
          echo "（Render ダッシュボードで GitHub 連携を設定済みの場合）"
